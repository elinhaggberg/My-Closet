<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    // Applied before the stylesheet paints, since the module script that
    // normally owns theming (js/theme.js) runs after HTML parsing and would
    // otherwise flash the default theme first on every load.
    try {
      var themeMode = (JSON.parse(localStorage.getItem("mc_theme_v1") || "{}") || {}).mode;
      document.documentElement.dataset.theme = themeMode || "playful";
    } catch (e) {}
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>My Closet</title>
  <meta name="description" content="Measurements, wishlist, links and moodboards — all stored on your device, no account, no ads." />
  <meta name="theme-color" content="#f5eedc" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app"></div>

  <!-- ===== Home ===== -->
  <template id="tpl-home">
    <header class="topbar home-topbar">
      <h1 id="home-title">My Closet</h1>
      <button class="icon-btn settings-btn" id="settings-btn" aria-label="Menu"><svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.2" stroke-linecap="round"><path d="M3.5 6.5h17M3.5 12h17M3.5 17.5h17"/></svg></button>
    </header>
    <div class="page-body">
      <p class="card-detail-section-label" style="padding:0 16px 8px;">Recently saved</p>
      <div class="card-grid" id="home-grid"></div>
    </div>
    <button class="fab" id="add-btn" aria-label="Save something new"><svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"/></svg></button>
  </template>

  <!-- ===== Boards list ===== -->
  <template id="tpl-boards">
    <header class="topbar">
      <h1>Boards</h1>
      <button class="icon-btn settings-btn" id="settings-btn" aria-label="Menu"><svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.2" stroke-linecap="round"><path d="M3.5 6.5h17M3.5 12h17M3.5 17.5h17"/></svg></button>
    </header>
    <div class="page-body">
      <div id="pinned-board-row" style="padding:4px 16px 4px;"></div>
      <div class="board-grid" id="boards-grid"></div>
    </div>
    <button class="fab" id="add-board-btn" aria-label="New board"><svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"/></svg></button>
  </template>

  <!-- ===== Board detail (also used for the built-in Wishlist board) ===== -->
  <template id="tpl-board">
    <header class="topbar">
      <button class="icon-btn back-btn" aria-label="Back"><svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg></button>
      <h1 id="board-title"></h1>
      <button class="icon-btn board-menu-btn hidden" id="board-menu-btn" aria-label="Board options"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="5" r="2.1"/><circle cx="12" cy="12" r="2.1"/><circle cx="12" cy="19" r="2.1"/></svg></button>
    </header>
    <div class="page-body">
      <div class="card-grid" id="board-grid"></div>
    </div>
    <button class="fab" id="add-to-board-btn" aria-label="Save to this board"><svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"/></svg></button>
  </template>

  <template id="tpl-pin-card">
    <article class="pin">
      <img class="pin-media hidden" loading="lazy" />
      <div class="pin-media-placeholder hidden"></div>
      <div class="pin-body">
        <h3 class="pin-title"></h3>
        <div class="pin-meta">
          <span class="pin-price hidden"></span>
          <span class="pin-source hidden"></span>
        </div>
        <span class="pin-badge hidden"></span>
      </div>
    </article>
  </template>

  <template id="tpl-board-tile">
    <button class="board-tile">
      <div class="board-cover"></div>
      <div class="board-tile-body">
        <p class="board-tile-title"></p>
        <p class="board-tile-meta"></p>
      </div>
    </button>
  </template>

  <!-- ===== Board menu / create / rename / delete ===== -->
  <template id="tpl-board-menu">
    <div class="sheet">
      <header class="sheet-header">
        <h2>Board options</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <button type="button" class="menu-item" id="rename-board-btn">
        <svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M352.9 21.2L308 66.1 445.9 204 490.8 159.1C504.4 145.6 512 127.2 512 108s-7.6-37.6-21.2-51.1L455.1 21.2C441.6 7.6 423.2 0 404 0s-37.6 7.6-51.1 21.2zM274.1 100L58.9 315.1c-10.7 10.7-18.5 24.1-22.6 38.7L.9 481.6c-2.3 8.3 0 17.3 6.2 23.4s15.1 8.5 23.4 6.2l127.8-35.5c14.6-4.1 27.9-11.8 38.7-22.6L412 237.9 274.1 100z"/></svg>
        <span>Rename board</span>
      </button>
      <button type="button" class="menu-item" id="export-board-btn">
        <svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M384 192c53 0 96-43 96-96s-43-96-96-96-96 43-96 96c0 5.4 .5 10.8 1.3 16L159.6 184.1c-16.9-15-39.2-24.1-63.6-24.1-53 0-96 43-96 96s43 96 96 96c24.4 0 46.6-9.1 63.6-24.1L289.3 400c-.9 5.2-1.3 10.5-1.3 16 0 53 43 96 96 96s96-43 96-96-43-96-96-96c-24.4 0-46.6 9.1-63.6 24.1L190.7 272c.9-5.2 1.3-10.5 1.3-16s-.5-10.8-1.3-16l129.7-72.1c16.9 15 39.2 24.1 63.6 24.1z"/></svg>
        <span>Export board</span>
      </button>
      <button type="button" class="menu-item" id="export-image-btn">
        <svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.1" stroke-linejoin="round" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M4 17l5-6 4 4 3-3 5 6"/></svg>
        <span>Export as image</span>
      </button>
      <button type="button" class="menu-item" id="delete-board-btn">
        <svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M136.7 5.9C141.1-7.2 153.3-16 167.1-16l113.9 0c13.8 0 26 8.8 30.4 21.9L320 32 416 32c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 96C14.3 96 0 81.7 0 64S14.3 32 32 32l96 0 8.7-26.1zM32 144l384 0 0 304c0 35.3-28.7 64-64 64L96 512c-35.3 0-64-28.7-64-64l0-304zm88 64c-13.3 0-24 10.7-24 24l0 192c0 13.3 10.7 24 24 24s24-10.7 24-24l0-192c0-13.3-10.7-24-24-24zm104 0c-13.3 0-24 10.7-24 24l0 192c0 13.3 10.7 24 24 24s24-10.7 24-24l0-192c0-13.3-10.7-24-24-24zm104 0c-13.3 0-24 10.7-24 24l0 192c0 13.3 10.7 24 24 24s24-10.7 24-24l0-192c0-13.3-10.7-24-24-24z"/></svg>
        <span>Delete board</span>
      </button>
    </div>
  </template>

  <template id="tpl-board-create">
    <div class="sheet">
      <header class="sheet-header">
        <h2 id="board-create-heading">New board</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <form id="board-create-form">
        <label class="field">
          <span>Name</span>
          <input type="text" name="name" maxlength="40" required autocomplete="off" placeholder="e.g. Autumn wardrobe" />
        </label>
        <div class="form-actions">
          <button type="submit" class="text-btn primary">Save</button>
        </div>
      </form>
    </div>
  </template>

  <!-- ===== Lists (checklists) ===== -->
  <template id="tpl-lists">
    <header class="topbar">
      <h1>Lists</h1>
      <button class="icon-btn settings-btn" id="settings-btn" aria-label="Menu"><svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.2" stroke-linecap="round"><path d="M3.5 6.5h17M3.5 12h17M3.5 17.5h17"/></svg></button>
    </header>
    <div class="page-body">
      <div class="board-grid" id="lists-grid"></div>
    </div>
    <button class="fab" id="add-list-btn" aria-label="New list"><svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"/></svg></button>
  </template>

  <template id="tpl-list-tile">
    <button class="board-tile list-tile">
      <div class="list-tile-icon"><svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.1" stroke-linejoin="round" stroke-linecap="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M7.5 8.5l1.2 1.2 2-2.2"/><path d="M13 8h4"/><path d="M7.5 15.5l1.2 1.2 2-2.2"/><path d="M13 15h4"/></svg></div>
      <div class="board-tile-body">
        <p class="board-tile-title"></p>
        <p class="board-tile-meta"></p>
      </div>
    </button>
  </template>

  <template id="tpl-checklist">
    <header class="topbar">
      <button class="icon-btn back-btn" aria-label="Back"><svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg></button>
      <h1 id="checklist-title"></h1>
      <button class="icon-btn" id="checklist-menu-btn" aria-label="List options"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="5" r="2.1"/><circle cx="12" cy="12" r="2.1"/><circle cx="12" cy="19" r="2.1"/></svg></button>
    </header>
    <div class="page-body">
      <div class="checklist-body">
        <div id="checklist-items"></div>
        <form id="add-item-form" class="add-item-row">
          <input type="text" name="text" maxlength="120" autocomplete="off" placeholder="Add an item…" />
          <button type="submit" class="icon-btn" aria-label="Add item"><svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"/></svg></button>
        </form>
      </div>
    </div>
  </template>

  <template id="tpl-list-menu">
    <div class="sheet">
      <header class="sheet-header">
        <h2>List options</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <button type="button" class="menu-item" id="rename-list-btn">
        <svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M352.9 21.2L308 66.1 445.9 204 490.8 159.1C504.4 145.6 512 127.2 512 108s-7.6-37.6-21.2-51.1L455.1 21.2C441.6 7.6 423.2 0 404 0s-37.6 7.6-51.1 21.2zM274.1 100L58.9 315.1c-10.7 10.7-18.5 24.1-22.6 38.7L.9 481.6c-2.3 8.3 0 17.3 6.2 23.4s15.1 8.5 23.4 6.2l127.8-35.5c14.6-4.1 27.9-11.8 38.7-22.6L412 237.9 274.1 100z"/></svg>
        <span>Rename list</span>
      </button>
      <button type="button" class="menu-item" id="export-list-btn">
        <svg class="icon" viewBox="0 0 512 512" aria-hidden="true" focusable="false"><path d="M384 192c53 0 96-43 96-96s-43-96-96-96-96 43-96 96c0 5.4 .5 10.8 1.3 16L159.6 184.1c-16.9-15-39.2-24.1-63.6-24.1-53 0-96 43-96 96s43 96 96 96c24.4 0 46.6-9.1 63.6-24.1L289.3 400c-.9 5.2-1.3 10.5-1.3 16 0 53 43 96 96 96s96-43 96-96-43-96-96-96c-24.4 0-46.6 9.1-63.6 24.1L190.7 272c.9-5.2 1.3-10.5 1.3-16s-.5-10.8-1.3-16l129.7-72.1c16.9 15 39.2 24.1 63.6 24.1z"/></svg>
        <span>Export list</span>
      </button>
      <button type="button" class="menu-item" id="delete-list-btn">
        <svg class="icon" viewBox="0 0 448 512" aria-hidden="true" focusable="false"><path d="M136.7 5.9C141.1-7.2 153.3-16 167.1-16l113.9 0c13.8 0 26 8.8 30.4 21.9L320 32 416 32c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 96C14.3 96 0 81.7 0 64S14.3 32 32 32l96 0 8.7-26.1zM32 144l384 0 0 304c0 35.3-28.7 64-64 64L96 512c-35.3 0-64-28.7-64-64l0-304zm88 64c-13.3 0-24 10.7-24 24l0 192c0 13.3 10.7 24 24 24s24-10.7 24-24l0-192c0-13.3-10.7-24-24-24zm104 0c-13.3 0-24 10.7-24 24l0 192c0 13.3 10.7 24 24 24s24-10.7 24-24l0-192c0-13.3-10.7-24-24-24zm104 0c-13.3 0-24 10.7-24 24l0 192c0 13.3 10.7 24 24 24s24-10.7 24-24l0-192c0-13.3-10.7-24-24-24z"/></svg>
        <span>Delete list</span>
      </button>
    </div>
  </template>

  <!-- ===== Save / edit card ===== -->
  <template id="tpl-save-choice">
    <div class="sheet">
      <header class="sheet-header">
        <h2>Save something</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <button type="button" class="choice-btn" id="choice-link">
        <span class="icon-circle"><svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.2" stroke-linecap="round"><rect x="1.8" y="9" width="10" height="6" rx="3" transform="rotate(-45 6.8 12)"/><rect x="12.2" y="9" width="10" height="6" rx="3" transform="rotate(-45 17.2 12)"/></svg></span>
        <span class="choice-text"><span class="choice-title">Paste a link</span><span class="choice-sub">Fetch the image, title and price automatically</span></span>
      </button>
      <button type="button" class="choice-btn" id="choice-photo">
        <span class="icon-circle"><svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.1" stroke-linejoin="round" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="3"/><path d="M8 7l1.5-3h5L16 7"/><circle cx="12" cy="14" r="4"/></svg></span>
        <span class="choice-text"><span class="choice-title">Add a photo</span><span class="choice-sub">From your camera or photo library</span></span>
      </button>
    </div>
  </template>

  <template id="tpl-card-editor">
    <div class="sheet">
      <header class="sheet-header">
        <h2 id="editor-heading">Save</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>

      <div id="editor-url-block" class="hidden">
        <div class="field-row">
          <label class="field" style="flex:1">
            <span>Link</span>
            <input type="url" id="editor-url-input" placeholder="https://…" autocomplete="off" />
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="text-btn secondary" id="editor-fetch-btn">Fetch details</button>
        </div>
        <p class="import-message hidden" id="editor-fetch-message"></p>
      </div>

      <div id="editor-photo-block" class="hidden">
        <div class="photo-drop" id="photo-drop">
          <svg class="icon icon-line" viewBox="0 0 24 24" aria-hidden="true" focusable="false" stroke-width="2.1" stroke-linejoin="round" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M4 17l5-6 4 4 3-3 5 6"/></svg>
          <span>Add a photo</span>
          <div class="photo-source-row">
            <button type="button" class="text-btn secondary" id="photo-camera-btn">Camera</button>
            <button type="button" class="text-btn secondary" id="photo-library-btn">Library</button>
          </div>
        </div>
        <div class="photo-preview-wrap hidden" id="photo-preview-wrap">
          <img class="photo-preview" id="photo-preview-img" alt="" />
          <button type="button" class="photo-preview-clear" id="photo-clear-btn" aria-label="Remove photo"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>

  <template id="tpl-instructions">
    <div class="sheet instructions-sheet">
      <header class="sheet-header">
        <h2>Instructions</h2>
        <button class="icon-btn close-btn" aria-label="Close"><svg class="icon" viewBox="0 0 384 512" aria-hidden="true" focusable="false"><path d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"/></svg></button>
      </header>
      <div class="instructions-body">
        <section>
          <h3>Installing on your phone</h3>
          <p>This is a web app, not an app-store app — but you can add it to your Home Screen so it opens full-screen, just like a regular app.</p>
          <p><strong>iOS (Safari):</strong> tap the Share icon, then "Add to Home Screen".</p>
          <p><strong>Android (Chrome):</strong> tap the ⋮ menu, then "Add to Home screen" (or "Install app").</p>
        </section>
        <section>
          <h3>Saving things</h3>
          <p>Tap the <strong>+</strong> button and either paste a link (the app fetches the image, title and price for you) or add your own photo from your camera or library.</p>
        </section>
        <section>
          <h3>Boards</h3>
          <p>Add anything you save to one or more boards to build Pinterest-style moodboards. Create new boards from the Boards tab or right from the save screen.</p>
          <p>Open the ⋮ menu on any board (including Wishlist) and tap <strong>Export as image</strong> to combine all of that board's images into one simple grid collage — a single picture you can share or save, like a proper moodboard.</p>
        </section>
        <section>
          <h3>Wishlist &amp; sizing</h3>
          <p>Toggle "Add to Wishlist" on a saved item to track its price and compare its own measurements against your body measurements. Pick a category (top, bottom, dress, outerwear, shoes) and fill in the garment's own measurements — the app tells you whether it'll run snug, true to size, or loose, dimension by dimension.</p>
          <p>Log your body measurements first from Settings → Measurements, since the comparison uses your latest snapshot.</p>
        </section>
        <section>
          <h3>Backup &amp; sharing</h3>
          <p>Export a single item or board to share with someone, or back up everything at once from Settings. Importing always merges into what you already have — it never replaces or deletes anything.</p>
        </section>
        <section>
          <h3>Your data</h3>
          <p>Everything you save is stored only on this device — there's no account, no server-side database, and nothing is collected. The only network request the app makes is a stateless link "unfurl" when you paste a URL, and it doesn't store anything either.</p>
          <p><strong>Removing the app from your Home Screen deletes its saved data too</strong> — it's not just an icon, so deleting it works the same as uninstalling an app.</p>
          <p>Use <strong>Export all data</strong> in Settings every so often to keep a backup.</p>
        </section>
        <section>
          <h3>Themes</h3>
          <p>Pick Playful, Light, or Dark from Settings → Customize. Playful lets you choose your own accent color too, and you can switch between centimeters and inches for measurements.</p>
        </section>
      </div>
    </div>
  </template>
